<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리치의 투두</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="todo-container">
      <header class="todo-container__title">
        <h3>Lychee's TODO</h3>
      </header>
      <form class="todo-container__input">
        <input id="inputTodo" placeholder="할 일 입력" />
        <button class="todo-container__button">할 일 추가</button>
      </form>
      <section class="render_container">
        <div class="render-container__item">
          <h4>할 일</h4>
          <div id="todos"></div>
        </div>
        <div class="render-container__item">
          <h4>완료</h4>
          <div id="todoDone"></div>
        </div>
      </section>
    </main>
    <script src="../dist/script.js"></script>
  </body>
</html>
